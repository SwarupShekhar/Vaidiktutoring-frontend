name: K12 Frontend CI

on:
  push:
    paths:
      - 'k12-frontend/**'
  pull_request:
    paths:
      - 'k12-frontend/**'

jobs:
  build:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            k12-frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('k12-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        working-directory: k12-frontend

      - name: Lint
        if: always()
        run: npm run lint --if-present
        working-directory: k12-frontend

      - name: Run tests
        run: npm test --if-present
        working-directory: k12-frontend

      - name: Build
        run: npm run build --if-present
        working-directory: k12-frontend

  deploy:
    name: Deploy Frontend (placeholder)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Deploy step for frontend. Configure deployment steps and secrets (Vercel token, Netlify token, or cloud credentials) before enabling."
